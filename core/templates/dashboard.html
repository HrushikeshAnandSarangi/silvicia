<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silvica QGIS Task Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background-color: #0d1117; color: white; font-family: 'Inter', sans-serif;}
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        .dashboard-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to map by default */
        }
        .pointer-events-auto { pointer-events: auto; }
        .glass-panel {
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Background Map -->
    <div id="map"></div>

    <div class="dashboard-overlay h-screen w-full flex flex-col p-6 pointer-events-none">
        
        <!-- Header & Upload -->
        <div class="flex justify-between items-start">
            <div class="glass-panel p-6 rounded-xl shadow-2xl pointer-events-auto w-1/3 min-w-[400px]">
                <h1 class="text-3xl font-black mb-1 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">Silvica Pipeline</h1>
                <p class="text-gray-400 text-sm mb-6">Real-time Task Simulation & Map Visualization</p>
                
                <h2 class="text-xs uppercase tracking-widest text-gray-500 font-bold mb-3">Upload QGIS Output</h2>
                <form id="uploadForm" class="flex flex-col gap-3 group">
                    <div class="relative border-2 border-dashed border-gray-600 rounded-lg p-4 transition-colors hover:border-blue-500">
                        <input type="file" id="fileInput" name="file" accept=".zip,.qgz,.geojson,.gpkg" class="block w-full text-sm text-gray-400
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-full file:border-0
                            file:text-xs file:font-bold
                            file:bg-blue-600 file:text-white
                            file:cursor-pointer hover:file:bg-blue-500 file:transition-colors
                        "/>
                    </div>
                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 rounded-lg mt-2 transition-all shadow-lg active:scale-95">
                        Import & Distribute to Workers
                    </button>
                    <button type="button" id="purgeBtn" class="bg-red-600/80 hover:bg-red-500 text-white font-bold py-2 rounded-lg mt-1 transition-all shadow border border-red-500/50 active:scale-95 text-xs">
                        ⚠️ Erase All Database Data
                    </button>
                </form>
                <p id="uploadStatus" class="mt-3 text-sm font-medium hidden text-center"></p>
            </div>
            
            <!-- Map Legend / Worker Details -->
            <div class="glass-panel p-4 rounded-xl shadow-2xl pointer-events-auto flex flex-col gap-3 min-w-[200px]">
                <h2 class="text-xs uppercase tracking-widest text-gray-400 font-bold">Worker Legends</h2>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.8)]"></div><span class="text-sm font-medium text-blue-200">Worker 1</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.8)]"></div><span class="text-sm font-medium text-orange-200">Worker 2</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.8)]"></div><span class="text-sm font-medium text-purple-200">Worker 3</span></div>
                <div class="h-px bg-gray-700 my-1"></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-md bg-gray-600"></div><span class="text-sm text-gray-400">Pending</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-md bg-green-500"></div><span class="text-sm text-green-400">Completed</span></div>
            </div>
        </div>

        <div class="flex-grow"></div>

        <!-- Bottom Status Bar -->
        <div class="flex gap-6 pointer-events-auto">
            <!-- Stats -->
            <div class="glass-panel p-5 rounded-xl shadow-lg flex gap-8 flex-1">
                <div class="flex flex-col">
                    <span class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Queue PENDING</span>
                    <span id="pendingCount" class="text-4xl font-black text-gray-300">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1"> PROCESSING</span>
                    <span id="processingCount" class="text-4xl font-black text-yellow-500 shadow-yellow-500">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1"> COMPLETED</span>
                    <span id="completedCount" class="text-4xl font-black text-green-500">0</span>
                </div>
            </div>

            <!-- Event Logs -->
            <div class="glass-panel p-4 rounded-xl shadow-lg w-1/3 flex flex-col">
                <h2 class="text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Live Telemetry</h2>
                <div id="logBox" class="flex-grow bg-black/50 p-3 rounded h-24 overflow-y-auto font-mono text-[10px] text-green-400 leading-relaxed border border-gray-800">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Init Map
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                "version": 8,
                "sources": {
                    "osm-dark": {
                        "type": "raster",
                        "tiles": ["https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png"],
                        "tileSize": 256
                    }
                },
                "layers": [{
                    "id": "osm-dark-layer",
                    "type": "raster",
                    "source": "osm-dark",
                    "minzoom": 0,
                    "maxzoom": 22
                }]
            },
            center: [0, 0],
            zoom: 2
        });

        const logBox = document.getElementById('logBox');
        
        function addLog(msg) {
            const el = document.createElement('div');
            el.innerText = `>> [${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
            fetchStats();
        }

        const loc = window.location;
        const endpoint = (loc.protocol === 'https:' ? 'wss://' : 'ws://') + loc.host + '/ws/dashboard/';
        const socket = new WebSocket(endpoint);

        socket.onopen = function(e) {
            addLog("Core WebSocket linked. Telemetry active.");
        }
        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            addLog(data.message);
        }

        document.getElementById('purgeBtn').addEventListener('click', async (e) => {
            if (!confirm("Are you sure you want to completely erase the database?")) return;
            try {
                const res = await fetch('/api/clear/', { method: 'POST' });
                if (res.ok) {
                    addLog("Database Successfully Erased.");
                    fetchStats(true);
                }
            } catch (err) {
                addLog('Purge failed: ' + err);
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const statusEl = document.getElementById('uploadStatus');
            statusEl.innerText = "Processing Geodata...";
            statusEl.className = "mt-3 text-sm font-medium text-center text-yellow-400 animate-pulse";

            try {
                const res = await fetch('/api/upload/', { method: 'POST', body: formData });
                const data = await res.json();
                statusEl.classList.remove('animate-pulse');
                if (res.ok) {
                    statusEl.innerText = data.message;
                    statusEl.className = "mt-3 text-sm font-bold text-center text-green-400";
                    fetchStats(true);
                } else {
                    statusEl.innerText = data.error;
                    statusEl.className = "mt-3 text-sm font-bold text-center text-red-500";
                }
            } catch (err) {
                statusEl.innerText = "Upload Exception: " + err;
                statusEl.className = "mt-3 text-sm font-bold text-center text-red-500";
            }
        });

        map.on('load', () => {
            // Add an empty source initially
            map.addSource('tasks', {
                'type': 'geojson',
                'data': { 'type': 'FeatureCollection', 'features': [] }
            });

            // Pending Polygon
            map.addLayer({
                'id': 'tasks-pending-fill',
                'type': 'fill',
                'source': 'tasks',
                'filter': ['==', 'status', 'PENDING'],
                'paint': { 'fill-color': '#4B5563', 'fill-opacity': 0.4 }
            });

            // Completed Polygon
            map.addLayer({
                'id': 'tasks-completed-fill',
                'type': 'fill',
                'source': 'tasks',
                'filter': ['==', 'status', 'COMPLETED'],
                'paint': { 'fill-color': '#10B981', 'fill-opacity': 0.6 }
            });

            // Processing Polygons by Worker
            map.addLayer({
                'id': 'tasks-w1',
                'type': 'fill',
                'source': 'tasks',
                'filter': ['all', ['==', 'status', 'PROCESSING'], ['==', 'worker_id', 1]],
                'paint': { 'fill-color': '#3B82F6', 'fill-opacity': 0.8 }
            });
            map.addLayer({
                'id': 'tasks-w1-pts',
                'type': 'circle',
                'source': 'tasks',
                'filter': ['all', ['==', 'status', 'PROCESSING'], ['==', 'worker_id', 1]],
                'paint': { 'circle-color': '#3B82F6', 'circle-radius': 6 }
            });

            map.addLayer({
                'id': 'tasks-w2',
                'type': 'fill',
                'source': 'tasks',
                'filter': ['all', ['==', 'status', 'PROCESSING'], ['==', 'worker_id', 2]],
                'paint': { 'fill-color': '#F97316', 'fill-opacity': 0.8 }
            });
            map.addLayer({
                'id': 'tasks-w2-pts',
                'type': 'circle',
                'source': 'tasks',
                'filter': ['all', ['==', 'status', 'PROCESSING'], ['==', 'worker_id', 2]],
                'paint': { 'circle-color': '#F97316', 'circle-radius': 6 }
            });

            map.addLayer({
                'id': 'tasks-w3',
                'type': 'fill',
                'source': 'tasks',
                'filter': ['all', ['==', 'status', 'PROCESSING'], ['==', 'worker_id', 3]],
                'paint': { 'fill-color': '#A855F7', 'fill-opacity': 0.8 }
            });
            map.addLayer({
                'id': 'tasks-w3-pts',
                'type': 'circle',
                'source': 'tasks',
                'filter': ['all', ['==', 'status', 'PROCESSING'], ['==', 'worker_id', 3]],
                'paint': { 'circle-color': '#A855F7', 'circle-radius': 6 }
            });

            // Pending/Completed Points
            map.addLayer({
                'id': 'tasks-pending-pts',
                'type': 'circle',
                'source': 'tasks',
                'filter': ['==', 'status', 'PENDING'],
                'paint': { 'circle-color': '#4B5563', 'circle-radius': 5 }
            });
            map.addLayer({
                'id': 'tasks-completed-pts',
                'type': 'circle',
                'source': 'tasks',
                'filter': ['==', 'status', 'COMPLETED'],
                'paint': { 'circle-color': '#10B981', 'circle-radius': 5 }
            });

            // Outlines (Polygons/Lines)
            map.addLayer({
                'id': 'tasks-outline',
                'type': 'line',
                'source': 'tasks',
                'paint': {
                    'line-color': '#FFFFFF',
                    'line-width': 1.5,
                    'line-opacity': 0.5
                }
            });
            
            // Start polling (forces map to refresh automatically)
            setInterval(() => fetchStats(), 1000);
            fetchStats(true);
        });

        // Keep track of tasks to generate fake logs safely on frontend if websocket is isolated
        let knownStates = {};

        async function fetchStats(fitbounds = false) {
            if (!map.isStyleLoaded()) return;

            try {
                const res = await fetch('/api/tasks.geojson');
                const data = await res.json();
                
                // Update map dataset
                map.getSource('tasks').setData(data);

                let pending = 0, processing = 0, completed = 0;
                let bounds = new maplibregl.LngLatBounds();
                let hasFeatures = false;

                data.features.forEach(f => {
                    const status = f.properties.status;
                    const id = f.properties.id;
                    const worker = f.properties.worker_id;

                    // Generate logs dynamically based on state transitions
                    if (knownStates[id] !== undefined && knownStates[id] !== status) {
                        if (status === 'PROCESSING') addLog(`Worker ${worker} acquired Task!`);
                        if (status === 'COMPLETED') addLog(`Worker ${worker} finished Task!`);
                    }
                    knownStates[id] = status;

                    if (status === 'PENDING') pending++;
                    if (status === 'PROCESSING') processing++;
                    if (status === 'COMPLETED') completed++;
                    
                    if (fitbounds && f.geometry) {
                        try {
                            if (f.geometry.type === 'Polygon') {
                                f.geometry.coordinates[0].forEach(coord => bounds.extend(coord));
                                hasFeatures = true;
                            } else if (f.geometry.type === 'MultiPolygon') {
                                f.geometry.coordinates.forEach(poly => poly[0].forEach(coord => bounds.extend(coord)));
                                hasFeatures = true;
                            } else if (f.geometry.type === 'Point') {
                                bounds.extend(f.geometry.coordinates);
                                hasFeatures = true;
                            }
                        } catch (e) {}
                    }
                });

                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('processingCount').innerText = processing;
                document.getElementById('completedCount').innerText = completed;

                if (fitbounds && hasFeatures) {
                    map.fitBounds(bounds, { padding: 80, duration: 2000 });
                }

            } catch (err) {
                console.error("Fetch Data Error:", err);
            }
        }
    </script>
</body>
</html>
